<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD Departamentos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <h2>Módulo Departamentos</h2>

      <form id="departmentForm">
        <input type="text" name="nombre" placeholder="Nombre del departamento" required />
        <input type="text" name="descripcion" placeholder="Descripción (opcional)" />

        <select name="activo">
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>

        <button type="submit">Guardar</button>
        <button type="button" id="clearForm" class="btn-clear">Limpiar</button>
      </form>

      <a href="/index.html" style="display:block;margin-top:12px;">← Volver a Empleados</a>
    </div>

    <div class="table-container">
      <h2>Lista de Departamentos</h2>

      <table id="departmentsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Activo</th>
            <th>Editar</th>
            <th>Eliminar</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script src="departments.js"></script>
  </body>
</html>
